
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB3D Shah VIP Hub</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1, h2 { color: var(--neon); text-shadow: 0 0 10px var(--neon); text-transform: uppercase; }
        .search-box { width: 90%; padding: 15px; border-radius: 30px; border: 2px solid var(--neon); background: #1a1a1a; color: white; margin-bottom: 20px; outline: none; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; max-width: 900px; margin: auto; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; border-bottom: 3px solid var(--neon); position: relative; }
        .code { display: block; font-size: 1.5rem; font-weight: bold; color: var(--neon); margin-bottom: 5px; }
        .copy-btn { background: var(--neon); color: black; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .ai-section { margin-top: 40px; padding: 20px; background: rgba(0,255,204,0.05); border-radius: 20px; border: 1px solid var(--neon); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button.ai-btn { padding: 12px; border-radius: 15px; border: none; background: var(--neon); color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>SHAH BHAI GAMING 🏎️</h1>
    <input type="text" id="searchInput" class="search-box" placeholder="Search Cheat (Zombie, Dino, Car)..." onkeyup="searchCheat()">

    <div class="container" id="cheatContainer">
        <div class="card"><span class="code">2030</span>Zombie Mode <br><button class="copy-btn" onclick="copyCode('2030')">COPY</button></div>
        <div class="card"><span class="code">5050</span>Dinosaur <br><button class="copy-btn" onclick="copyCode('5050')">COPY</button></div>
        <div class="card"><span class="code">9090</span>Thar <br><button class="copy-btn" onclick="copyCode('9090')">COPY</button></div>
        <div class="card"><span class="code">4040</span>Tank <br><button class="copy-btn" onclick="copyCode('4040')">COPY</button></div>
        <div class="card"><span class="code">0000</span>Dirt Bike <br><button class="copy-btn" onclick="copyCode('0000')">COPY</button></div>
        <div class="card"><span class="code">8000</span>Helicopter <br><button class="copy-btn" onclick="copyCode('8000')">COPY</button></div>
    </div>

    <div class="ai-section">
        <h2>AI Content Studio 🤖</h2>
        <input type="text" id="aiPrompt" style="width:80%; padding:10px; border-radius:10px;" placeholder="Topic likhen...">
        <div class="btn-grid">
            <button class="ai-btn" onclick="generateAI(1)">Script</button>
            <button class="ai-btn" onclick="generateAI(5)">Viral Tags</button>
        </div>
        <div id="aiResult" style="margin-top:15px; color:var(--neon);"></div>
    </div>

    <script>
        function copyCode(text) {
            navigator.clipboard.writeText(text);
            alert("Code Copy Ho Gaya: " + text);
        }
        function searchCheat() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                cards[i].style.display = text.includes(input) ? "" : "none";
            }
        }
        function generateAI(option) {
            let topic = document.getElementById('aiPrompt').value;
            let resultDiv = document.getElementById('aiResult');
            if(option === 1) resultDiv.innerHTML = "<b>📜 Script:</b> Salam doston! Aaj hum " + topic + " try karenge!";
            if(option === 5) resultDiv.innerHTML = "<b>🔥 Tags:</b> #ShahBhai #IB3D #Gaming #Viral";
        }
    </script>
</body>
</html>
