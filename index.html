<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB3D VIP Cheat Codes</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-size: 2rem; }
        .search-box { width: 90%; padding: 12px; border-radius: 25px; border: 2px solid var(--neon); background: #1a1a1a; color: white; margin-bottom: 20px; outline: none; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: auto; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 15px; border-bottom: 3px solid var(--neon); transition: 0.3s; }
        .card:hover { transform: scale(1.05); background: #222; }
        .code { display: block; font-size: 1.5rem; font-weight: bold; color: var(--neon); margin-bottom: 5px; }
        .name { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .no-result { display: none; margin-top: 20px; color: #ff4444; }
    </style>
</head>
<body>

    <h1>IB3D VIP CHEATS</h1>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Search any cheat (e.g. Dirt Bike, Car)..." onkeyup="searchCheat()">

    <div class="container" id="cheatContainer">
        <div class="card">
            <span class="code">0000</span>
            <span class="name">Dirt Bike</span>
        </div>
        <div class="card">
            <span class="code">400</span>
            <span class="name">ZX10R Bike</span>
        </div>
        <div class="card">
            <span class="code">600</span>
            <span class="name">Dog</span>
        </div>
        <div class="card">
            <span class="code">1000</span>
            <span class="name">Fortuner</span>
        </div>
        <div class="card">
            <span class="code">1111</span>
            <span class="name">Cycle</span>
        </div>
        <div class="card">
            <span class="code">2222</span>
            <span class="name">ATV</span>
        </div>
        <div class="card">
            <span class="code">9000</span>
            <span class="name">Splendor</span>
        </div>
        <div class="card">
            <span class="code">5555</span>
            <span class="name">Ghost Rider Bike</span>
        </div>
        <div class="card">
            <span class="code">8000</span>
            <span class="name">Helicopter</span>
        </div>
    </div>

    <p id="noResult" class="no-result">Oops! No cheat found.</p>

    <script>
        function searchCheat() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            let found = false;

            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                if (text.includes(input)) {
                    cards[i].style.display = "";
                    found = true;
                } else {
                    cards[i].style.display = "none";
                }
            }
            
            document.getElementById('noResult').style.display = found ? "none" : "block";
        }
    </script>
</body>
</html>
