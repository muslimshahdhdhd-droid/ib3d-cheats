<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shah Bhai Gaming Hub</title>
    <style>
        :root { --main: #ff3300; --bg: #050505; --neon: #00ffcc; }
        body { background: var(--bg); color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 15px; }
        h1 { color: var(--main); text-shadow: 0 0 15px var(--main); font-size: 2rem; }
        .search-box { width: 85%; padding: 15px; border-radius: 50px; border: 2px solid var(--main); background: #111; color: white; margin-bottom: 25px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border-top: 4px solid var(--main); transition: 0.3s; }
        .card:hover { transform: scale(1.05); border-color: var(--neon); }
        .code-text { font-size: 1.8rem; font-weight: bold; color: var(--neon); display: block; }
        .copy-btn { margin-top: 10px; background: var(--main); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .ai-hub { margin-top: 50px; border: 2px dashed var(--neon); padding: 20px; border-radius: 25px; background: #0c0c0c; }
        .ai-btn { background: var(--neon); color: black; padding: 12px; border: none; border-radius: 10px; font-weight: bold; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>SHAH BHAI GAMING 🚀</h1>
    <input type="text" id="find" class="search-box" placeholder="Search Code (Monster, Flying, etc)..." onkeyup="filter()">

    <div class="grid" id="box">
        <div class="card"><span class="code-text">800</span>Flying Car <br><button class="copy-btn" onclick="copy('800')">COPY</button></div>
        <div class="card"><span class="code-text">0900</span>Monster Truck <br><button class="copy-btn" onclick="copy('0900')">COPY</button></div>
        <div class="card"><span class="code-text">2030</span>Zombie Mode <br><button class="copy-btn" onclick="copy('2030')">COPY</button></div>
        <div class="card"><span class="code-text">5050</span>Dinosaur <br><button class="copy-btn" onclick="copy('5050')">COPY</button></div>
        <div class="card"><span class="code-text">9090</span>Thar <br><button class="copy-btn" onclick="copy('9090')">COPY</button></div>
        <div class="card"><span class="code-text">1111</span>Cycle <br><button class="copy-btn" onclick="copy('1111')">COPY</button></div>
    </div>

    <div class="ai-hub">
        <h2>Shah AI Content Maker 🤖</h2>
        <input type="text" id="topic" style="width:70%; padding:10px;" placeholder="Video topic likhen...">
        <br><br>
        <button class="ai-btn" onclick="runAI(1)">Script</button>
        <button class="ai-btn" onclick="runAI(5)" style="background:gold;">Viral Tags</button>
        <div id="out" style="margin-top:20px; color:var(--neon); font-weight:bold;"></div>
    </div>

    <script>
        function copy(t) { navigator.clipboard.writeText(t); alert("Copied: " + t); }
        function filter() {
            let val = document.getElementById('find').value.toLowerCase();
            let items = document.getElementsByClassName('card');
            for (let i of items) { i.style.display = i.innerText.toLowerCase().includes(val) ? "" : "none"; }
        }
        function runAI(opt) {
            let t = document.getElementById('topic').value;
            let res = document.getElementById('out');
            if(!t) { alert("Pehle topic likhen!"); return; }
            if(opt === 1) res.innerHTML = "📜 Script: Aaj hum " + t + " ka khatarnak stunt karenge!";
            if(opt === 5) res.innerHTML = "🔥 Tags: #ShahBhai #IB3D #FlyingCar #Gaming #SanglaHill";
        }
    </script>
</body>
</html>
